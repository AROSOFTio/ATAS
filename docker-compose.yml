services:
  backend:
    build:
      context: ./backend
    container_name: timetable-backend
    env_file:
      - .env
    ports:
      - "4000:4000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:4000
    container_name: timetable-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped

