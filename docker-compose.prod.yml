services:
  backend:
    build:
      context: ./backend
    container_name: atas-backend-prod
    env_file:
      - .env
    ports:
      - "127.0.0.1:4000:4000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    container_name: atas-frontend-prod
    depends_on:
      - backend
    ports:
      - "127.0.0.1:8080:80"
    restart: unless-stopped

